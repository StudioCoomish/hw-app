<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>開運方位</title>
  <link rel="apple-touch-icon" href="hw_icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ハッピーウォーキング">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    :root {
      --blue-light:   #e6f4fc;
      --blue-mid:     #90c8e8;
      --blue-dark:    #3a80aa;
      --bg:           #f4faff;
      --white:        #ffffff;
      --text:         #888;
      --sub:          #b0b8c4;
      --border:       #ddeef8;
      --shadow:       0 2px 14px rgba(60,120,180,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      font-family: 'Hiragino Kaku Gothic Pro', 'Hiragino Sans', 'Yu Gothic', sans-serif;
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #ceeafc 0%, #e8f6ff 100%);
      padding: 22px 20px 18px;
      text-align: center;
      border-bottom: 1.5px solid var(--blue-mid);
    }
    .header-label { font-size: 11px; color: var(--sub); letter-spacing: 0.14em; margin-bottom: 5px; }
    .header-date  { font-size: 28px; font-weight: bold; color: var(--blue-dark); }
    .header-wday  { font-size: 18px; color: var(--sub); margin-left: 6px; }

    /* ── Card ── */
    .card {
      background: var(--white);
      margin: 12px;
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-head {
      background: var(--blue-light);
      padding: 10px 16px;
      font-size: 12px;
      color: var(--blue-dark);
      font-weight: bold;
      letter-spacing: 0.07em;
      border-bottom: 1px solid var(--border);
    }
    .card-body { padding: 16px; }

    /* ── Compass 3×3 ── */
    .compass {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      max-width: 232px;
      margin: 0 auto;
    }
    .cc {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 13px;
      background: #e8f4fc;
      min-height: 62px;
    }
    .cc.great { background: linear-gradient(135deg, #ffe040, #ffb800); }
    .cc.good  { background: linear-gradient(135deg, #fff6b0, #ffe680); }
    .cc.center { background: linear-gradient(135deg, #b8ddf4, #90c8e8); }
    .cc-dir  { font-size: 10px; color: var(--sub); margin-bottom: 2px; }
    .cc.great .cc-dir, .cc.good .cc-dir { color: #7a5800; }
    .cc-mark { font-size: 24px; line-height: 1; color: #b0cfe0; }
    .cc.great .cc-mark { color: #7a4a00; font-size: 26px; }
    .cc.good  .cc-mark { color: #9a7000; }

    /* ── Info rows ── */
    .info-row {
      display: flex; gap: 8px; padding: 8px 0;
      border-top: 1px solid var(--border);
      font-size: 13px; line-height: 1.5; align-items: flex-start;
    }
    .info-icon { flex-shrink: 0; font-size: 14px; }
    .bad-time  { color: #b03030; }

    /* ── Time slots ── */
    .slots { }
    .slot {
      display: flex;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .slot:last-child { border-bottom: none; }
    .slot.now {
      background: linear-gradient(90deg, #fffae0 0%, transparent 100%);
      margin: 0 -16px;
      padding: 13px 16px;
    }
    .slot.dim { opacity: 0.28; }

    /* Time block */
    .slot-time-block {
      flex-shrink: 0;
      min-width: 96px;
    }
    .slot-time-main {
      font-size: 17px;
      font-weight: bold;
      color: var(--blue-dark);
      letter-spacing: 0.02em;
    }
    .now-badge {
      display: inline-block;
      background: var(--blue-mid);
      color: white;
      font-size: 9px;
      padding: 1px 7px;
      border-radius: 8px;
      margin-left: 4px;
      vertical-align: middle;
    }

    /* Pills */
    .pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: bold;
    }
    .pill.great { background: linear-gradient(135deg,#ffe040,#ffb800); color: #6a4000; }
    .pill.good  { background: linear-gradient(135deg,#fff3a0,#ffe060); color: #8a6000; }
    .empty-dir  { color: var(--sub); font-size: 12px; font-style: italic; }

    /* ── 三重丸（ピンク） ── */
    .cc.triple { background: linear-gradient(135deg, #ffcce0, #ff85b3); }
    .cc.triple .cc-dir  { color: #7a0038; }
    .cc.triple .cc-mark { color: #5a0028; font-size: 26px; }
    .pill.triple { background: linear-gradient(135deg, #ffcce0, #ff85b3); color: #6a0030; }
    .type-badge {
      display: inline-block; font-size: 9px;
      background: #7ab88a; color: white;
      border-radius: 6px; padding: 1px 5px;
      margin-left: 3px; font-weight: bold; vertical-align: middle;
    }
    .tag-badge {
      display: inline-block; font-size: 10px;
      background: #ff85b3; color: white;
      border-radius: 8px; padding: 1px 6px;
      margin-left: 4px; font-weight: bold; vertical-align: middle;
    }

    /* ── 三重丸追加ボタン ── */
    .add-triple-btn {
      position: fixed; bottom: 24px; right: 20px;
      width: 54px; height: 54px; border-radius: 50%;
      background: linear-gradient(135deg, #ffcce0, #ff85b3);
      color: white; font-size: 28px; border: none;
      box-shadow: 0 3px 16px rgba(255,100,160,0.38);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; z-index: 50;
    }

    /* ── モーダル ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.38);
      display: flex; align-items: flex-end;
      z-index: 100; animation: fadeIn 0.2s;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .modal-sheet {
      background: white; border-radius: 22px 22px 0 0;
      padding: 22px 20px 44px; width: 100%;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from{transform:translateY(60%)} to{transform:translateY(0)} }
    .modal-title {
      font-size: 16px; font-weight: bold; color: #c05080;
      margin-bottom: 18px; text-align: center;
    }
    .form-row { margin-bottom: 14px; }
    .form-label { font-size: 12px; color: #888; margin-bottom: 5px; display: block; }
    .form-select, .form-input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #ffd6e8; border-radius: 12px;
      font-size: 15px; color: #555; background: #fff8fb;
      -webkit-appearance: none; outline: none;
    }
    .form-btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel {
      flex: 1; padding: 13px; border-radius: 14px;
      border: 1.5px solid #ddeef8; background: white;
      color: #888; font-size: 15px; cursor: pointer;
    }
    .btn-save {
      flex: 2; padding: 13px; border-radius: 14px;
      border: none; background: linear-gradient(135deg, #ffcce0, #ff85b3);
      color: white; font-size: 15px; font-weight: bold; cursor: pointer;
    }
    .triple-list { margin-top: 18px; }
    .triple-list-title { font-size: 12px; color: #c05080; margin-bottom: 8px; font-weight: bold; }
    .triple-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid #fdeef5; font-size: 13px; color: #555;
    }
    .triple-del-btn {
      background: none; border: none; color: #ffaacc; font-size: 18px;
      cursor: pointer; padding: 0 4px; line-height: 1;
    }

    /* ── Nav buttons ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
    }
    .nav-btn {
      background: rgba(255,255,255,0.55);
      border: 1.5px solid var(--blue-mid);
      color: var(--blue-dark);
      border-radius: 50%;
      width: 36px; height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:active { background: rgba(255,255,255,0.9); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-today {
      font-size: 11px;
      color: var(--blue-dark);
      background: rgba(255,255,255,0.55);
      border: 1.5px solid var(--blue-mid);
      border-radius: 12px;
      padding: 3px 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .footer {
      text-align: center;
      padding: 14px;
      font-size: 11px;
      color: var(--sub);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-label">ハッピーウォーキング 開運方位</div>
  <div class="header-date" id="hd">読み込み中</div>
  <div class="nav">
    <button class="nav-btn" id="btn-prev" onclick="move(-1)">‹</button>
    <button class="nav-today" onclick="move(0)">今日</button>
    <button class="nav-btn" id="btn-next" onclick="move(1)">›</button>
  </div>
</div>

<div id="app"></div>

<div class="footer">Happy Walking 開運方位 2026年5月</div>

<button class="add-triple-btn" onclick="openModal()" title="三重丸を追加">＋</button>

<div id="modal-overlay" style="display:none" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-title">🌸 三重丸を追加</div>

    <div class="form-row">
      <label class="form-label">日付</label>
      <select class="form-select" id="f-day"></select>
    </div>
    <div class="form-row">
      <label class="form-label">時間帯</label>
      <select class="form-select" id="f-slot">
        <option value="overall">全体方位</option>
        <option value="子">23:00〜01:00</option>
        <option value="丑">01:00〜03:00</option>
        <option value="寅">03:00〜05:00</option>
        <option value="卯">05:00〜07:00</option>
        <option value="辰">07:00〜09:00</option>
        <option value="巳">09:00〜11:00</option>
        <option value="午">11:00〜13:00</option>
        <option value="未">13:00〜15:00</option>
        <option value="申">15:00〜17:00</option>
        <option value="酉">17:00〜19:00</option>
        <option value="戌">19:00〜21:00</option>
        <option value="亥">21:00〜23:00</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">方位</label>
      <select class="form-select" id="f-dir">
        <option value="南東">南東</option>
        <option value="南">南</option>
        <option value="南西">南西</option>
        <option value="東">東</option>
        <option value="西">西</option>
        <option value="北東">北東</option>
        <option value="北">北</option>
        <option value="北西">北西</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">ひとこと（任意）　例：SNS　玉</label>
      <input class="form-input" id="f-tag" type="text" placeholder="SNS / 玉 など" maxlength="6">
    </div>

    <div class="form-btn-row">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveTriple()">保存</button>
    </div>

    <div class="triple-list" id="triple-list"></div>
  </div>
</div>

// 3×3 グリッド (南=上, 東=左)
const GRID = [
  ['南東','南','南西'],
  ['東', null,'西'],
  ['北東','北','北西']
];

// 時間帯 (24h)
const ZODIAC_ORDER = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const ZODIAC_24H = {
  '子': ['23:00','01:00'],
  '丑': ['01:00','03:00'],
  '寅': ['03:00','05:00'],
  '卯': ['05:00','07:00'],
  '辰': ['07:00','09:00'],
  '巳': ['09:00','11:00'],
  '午': ['11:00','13:00'],
  '未': ['13:00','15:00'],
  '申': ['15:00','17:00'],
  '酉': ['17:00','19:00'],
  '戌': ['19:00','21:00'],
  '亥': ['21:00','23:00'],
};

function nowZodiac() {
  const h = new Date().getHours();
  if (h>=23||h<1) return '子'; if (h<3) return '丑';
  if (h<5) return '寅';  if (h<7) return '卯';
  if (h<9) return '辰';  if (h<11) return '巳';
  if (h<13) return '午'; if (h<15) return '未';
  if (h<17) return '申'; if (h<19) return '酉';
  if (h<21) return '戌'; return '亥';
}

// ── 三重丸データ管理 ──
const TRIPLE_KEY = 'hw_triple_2026_05';
function loadTriples() {
  try { return JSON.parse(localStorage.getItem(TRIPLE_KEY)||'[]'); } catch(e) { return []; }
}
function saveTripleData(arr) { localStorage.setItem(TRIPLE_KEY, JSON.stringify(arr)); }
function getTriple(month, day, zodiac, dir) {
  return loadTriples().find(t => t.month===month && t.day===day && t.zodiac===zodiac && t.dir===dir);
}

// ── モーダル操作 ──
function openModal() {
  // 日付セレクトを今表示中の日にデフォルト設定
  const sel = document.getElementById('f-day');
  if (sel.options.length === 0) {
    for (let i=1;i<=31;i++) {
      const o = document.createElement('option');
      o.value = i; o.textContent = i + '日';
      sel.appendChild(o);
    }
  }
  // 現在表示中の日を選択
  const now = new Date(); now.setDate(now.getDate()+offset);
  sel.value = now.getDate();
  document.getElementById('f-tag').value = '';
  renderTripleList();
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').style.display = 'none';
}
function saveTriple() {
  const day  = parseInt(document.getElementById('f-day').value);
  const zodiac = document.getElementById('f-slot').value;
  const dir  = document.getElementById('f-dir').value;
  const tag  = document.getElementById('f-tag').value.trim();
  const arr  = loadTriples();
  // 同じ組み合わせが既にあれば上書き
  const idx = arr.findIndex(t => t.month===5 && t.day===day && t.zodiac===zodiac && t.dir===dir);
  if (idx>=0) arr[idx].tag = tag;
  else arr.push({ month:5, day, zodiac, dir, tag });
  saveTripleData(arr);
  renderTripleList();
  render();
}
function deleteTriple(month, day, zodiac, dir) {
  const arr = loadTriples().filter(t => !(t.month===month && t.day===day && t.zodiac===zodiac && t.dir===dir));
  saveTripleData(arr);
  renderTripleList();
  render();
}
function renderTripleList() {
  const arr = loadTriples();
  const el = document.getElementById('triple-list');
  if (!arr.length) { el.innerHTML=''; return; }
  const SLOT_LABEL = {overall:'全体',子:'23-01',丑:'01-03',寅:'03-05',卯:'05-07',
    辰:'07-09',巳:'09-11',午:'11-13',未:'13-15',申:'15-17',酉:'17-19',戌:'19-21',亥:'21-23'};
  let h = '<div class="triple-list-title">登録済み三重丸</div>';
  for (const t of arr) {
    const label = `5/${t.day} ${SLOT_LABEL[t.zodiac]||t.zodiac} ${t.dir}${t.tag?' ('+t.tag+')':''}`;
    h += `<div class="triple-item">
      <span>${label}</span>
      <button class="triple-del-btn" onclick="deleteTriple(${t.month},${t.day},'${t.zodiac}','${t.dir}')">×</button>
    </div>`;
  }
  el.innerHTML = h;
}

function compassHTML(grid, month, day) {
  let h = '<div class="compass">';
  for (let r=0;r<3;r++) for (let c=0;c<3;c++) {
    const dir = GRID[r][c];
    if (!dir) { h+='<div class="cc center"><span style="font-size:11px;color:#fff;font-weight:bold">全体</span></div>'; continue; }
    const m = grid[dir]||'';
    const triple = month ? getTriple(month, day, 'overall', dir) : null;
    const cls = triple ? 'triple' : m==='◎'?'great':m==='○'?'good':'';
    const show = triple ? '◎' : (m==='◎'||m==='○') ? m : '';
    h += `<div class="cc ${cls}">
      <span class="cc-dir">${dir}</span>
      <span class="cc-mark">${show||'　'}</span>
      ${triple && triple.tag ? `<span style="font-size:9px;color:#7a0038;font-weight:bold">${triple.tag}</span>` : ''}
    </div>`;
  }
  h += '</div>';
  return h;
}

let offset = 0;  // 今日からの日数オフセット

function move(delta) {
  if (delta === 0) { offset = 0; }
  else { offset += delta; }
  // 範囲クランプ
  const today = new Date();
  const todayIdx = DATA.findIndex(x => {
    const t = new Date(today); t.setDate(t.getDate());
    return x.year===today.getFullYear()&&x.month===today.getMonth()+1&&x.day===today.getDate();
  });
  if (todayIdx !== -1) {
    const minOff = -todayIdx;
    const maxOff = DATA.length - 1 - todayIdx;
    offset = Math.max(minOff, Math.min(maxOff, offset));
  }
  render();
}

function render() {
  const now = new Date();
  const target = new Date(now);
  target.setDate(target.getDate() + offset);
  const y=target.getFullYear(), mo=target.getMonth()+1, d=target.getDate();
  const cur = (offset === 0) ? nowZodiac() : null;  // 今日以外はいま表示しない
  const WD = ['日','月','火','水','木','金','土'];

  // ボタンの有効/無効
  const todayIdx = DATA.findIndex(x=>x.year===now.getFullYear()&&x.month===now.getMonth()+1&&x.day===now.getDate());
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  if (btnPrev) btnPrev.disabled = (todayIdx !== -1 && offset <= -todayIdx);
  if (btnNext) btnNext.disabled = (todayIdx !== -1 && offset >= DATA.length - 1 - todayIdx);

  let day = DATA.find(x=>x.year===y&&x.month===mo&&x.day===d);
  const wd = day ? day.weekday : WD[target.getDay()];
  const isToday = offset === 0;
  document.getElementById('hd').innerHTML =
    `${mo}月${d}日 <span class="header-wday">（${wd}）</span>`
    + (isToday ? '' : '');

  if (!day) {
    document.getElementById('app').innerHTML =
      `<div style="text-align:center;padding:48px 20px;color:var(--sub)">
        <div style="font-size:44px;margin-bottom:14px">🗓️</div>
        <div>今日のデータがありません</div>
       </div>`;
    return;
  }

  let html = '';

  // ── 全体方位 ──
  html += `<div class="card">
    <div class="card-head">🧭 日盤</div>
    <div class="card-body">
      ${compassHTML(day.overall, day.month, day.day)}`;

  if (day.lucky_info.length||day.bad_time) {
    html += '<div style="margin-top:14px">';
    for (const info of day.lucky_info)
      html += `<div class="info-row"><span class="info-icon">✨</span><span>${info}</span></div>`;
    if (day.bad_time)
      html += `<div class="info-row"><span class="info-icon">⚠️</span><span class="bad-time">大凶の時間：${day.bad_time}</span></div>`;
    html += '</div>';
  }
  html += '</div></div>';

  // ── 時間帯スロット ──
  html += `<div class="card">
    <div class="card-head">🕐 時間帯ごとの良い方角</div>
    <div class="card-body slots">`;

  for (const z of ZODIAC_ORDER) {
    const slot = day.slots[z];
    if (!slot) continue;
    const isCur = z===cur;
    const hasGood = slot.good.length>0;
    const [t0,t1] = ZODIAC_24H[z];
    const tStr = `${t0}〜${t1}`;

    html += `<div class="slot ${isCur?'now':''} ${!hasGood&&!isCur?'dim':''}">`;

    // 時間ブロック
    html += `<div class="slot-time-block">
      <span class="slot-time-main">${tStr}</span>`;
    if (isCur) html += `<span class="now-badge">▶ いま</span>`;
    html += `</div>`;

    // 方角ピル
    html += `<div>`;
    if (hasGood) {
      html += '<div class="pills">';
      for (const g of slot.good) {
        const triple = getTriple(day.month, day.day, z, g.dir);
        const cls = triple ? 'triple' : g.mark==='◎'?'great':'good';
        const tag = triple && triple.tag ? `<span class="tag-badge">${triple.tag}</span>` : '';
        const typeStr = g.types ? `<span class="type-badge">${g.types}</span>` : '';
        html += `<span class="pill ${cls}">${g.dir} ${g.mark}${typeStr}${tag}</span>`;
      }
      html += '</div>';
    } else {
      html += '<div class="empty-dir">良い方角なし</div>';
    }
    html += '</div></div>';
  }

  html += '</div></div>';
  document.getElementById('app').innerHTML = html;
}

render();
setInterval(() => { if (offset === 0) render(); }, 60000);
</script>
